<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TOEIC 英単語クイズ</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --primary: #4A90E2;
      --primary-dark: #357ABD;
      --review: #9B59B6;
      --review-dark: #7D3C98;
      --correct: #27AE60;
      --wrong: #E74C3C;
      --bg: #F0F4F8;
      --card: #FFFFFF;
      --text: #2D3748;
      --subtext: #718096;
      --border: #E2E8F0;
      --shadow: 0 4px 20px rgba(0,0,0,0.10);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ===== HEADER ===== */
    header {
      width: 100%;
      background: var(--primary);
      color: white;
      padding: 16px 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(74,144,226,0.4);
      transition: background 0.3s;
    }

    header.review-mode {
      background: var(--review);
      box-shadow: 0 2px 8px rgba(155,89,182,0.4);
    }

    header h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
    header p  { font-size: 12px; opacity: 0.85; margin-top: 2px; }

    /* ===== MAIN ===== */
    main {
      width: 100%;
      max-width: 480px;
      padding: 16px;
      flex: 1;
    }

    /* ===== SCREEN MANAGEMENT ===== */
    .screen { display: none; }
    .screen.active { display: block; }

    /* ===== START SCREEN ===== */
    .start-card {
      background: var(--card);
      border-radius: 20px;
      padding: 28px 20px 24px;
      box-shadow: var(--shadow);
      text-align: center;
      margin-top: 16px;
    }

    .start-card .icon { font-size: 56px; margin-bottom: 12px; }
    .start-card h2   { font-size: 21px; margin-bottom: 6px; }
    .start-card > p  { color: var(--subtext); font-size: 13px; line-height: 1.6; margin-bottom: 20px; }

    /* level select */
    .level-select { margin-bottom: 20px; }
    .level-select label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--subtext); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .level-btns { display: flex; gap: 8px; justify-content: center; }
    .level-btn {
      padding: 8px 18px; border-radius: 20px; border: 2px solid var(--border);
      background: white; font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all 0.2s; color: var(--subtext);
    }
    .level-btn.selected { border-color: var(--primary); background: var(--primary); color: white; }

    /* ===== MODE CARDS ===== */
    .mode-cards { display: flex; flex-direction: column; gap: 12px; }

    .mode-card {
      border-radius: 16px;
      padding: 18px 20px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .mode-card:active { transform: scale(0.98); }
    .mode-card:disabled, .mode-card[disabled] {
      opacity: 0.45; cursor: not-allowed; pointer-events: none;
    }

    .mode-card.challenge {
      background: linear-gradient(135deg, #EBF4FF 0%, #DBEAFE 100%);
      border-color: #BFDBFE;
    }
    .mode-card.challenge:not([disabled]):hover {
      box-shadow: 0 4px 16px rgba(74,144,226,0.25);
    }

    .mode-card.review {
      background: linear-gradient(135deg, #F5EEFF 0%, #EDE9FE 100%);
      border-color: #DDD6FE;
    }
    .mode-card.review:not([disabled]):hover {
      box-shadow: 0 4px 16px rgba(155,89,182,0.25);
    }

    .mode-icon { font-size: 40px; flex-shrink: 0; }

    .mode-info { flex: 1; }
    .mode-title { font-size: 17px; font-weight: 800; margin-bottom: 3px; }
    .mode-card.challenge .mode-title { color: var(--primary); }
    .mode-card.review    .mode-title { color: var(--review); }
    .mode-desc { font-size: 12px; color: var(--subtext); line-height: 1.5; }

    .mode-badge {
      background: var(--review);
      color: white;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .mode-arrow { font-size: 18px; color: var(--subtext); flex-shrink: 0; }

    /* ===== QUIZ MODE BANNER ===== */
    .mode-banner {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .mode-banner.challenge { background: #EBF4FF; color: var(--primary); }
    .mode-banner.review    { background: #F5EEFF; color: var(--review); }

    /* ===== STATS BAR ===== */
    .stats-bar {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--card); border-radius: 14px; padding: 12px 16px;
      margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .stat { text-align: center; }
    .stat-val { font-size: 20px; font-weight: 700; color: var(--primary); }
    .stat-val.review-color { color: var(--review); }
    .stat-label { font-size: 11px; color: var(--subtext); margin-top: 2px; }
    .stat-divider { width: 1px; height: 32px; background: var(--border); }

    /* ===== PROGRESS ===== */
    .progress-wrap {
      background: var(--border); border-radius: 8px;
      height: 6px; margin-bottom: 14px; overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), #63B3ED);
      border-radius: 8px; transition: width 0.4s ease;
    }
    .progress-bar.review-bar {
      background: linear-gradient(90deg, var(--review), #C39BD3);
    }

    /* ===== QUESTION CARD ===== */
    .question-card {
      background: var(--card); border-radius: 20px;
      padding: 24px 20px 20px; box-shadow: var(--shadow);
      margin-bottom: 14px; text-align: center;
    }
    .question-num {
      font-size: 12px; color: var(--subtext); margin-bottom: 12px;
      font-weight: 600; letter-spacing: 0.5px;
    }
    .word {
      font-size: 36px; font-weight: 800; color: var(--text);
      letter-spacing: -1px; margin-bottom: 8px; word-break: break-all;
    }
    .pronunciation { font-size: 14px; color: var(--subtext); margin-bottom: 8px; font-style: italic; }
    .part-of-speech {
      display: inline-block; background: #EBF4FF; color: var(--primary);
      font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 20px;
    }
    .part-of-speech.review-pos { background: #F5EEFF; color: var(--review); }

    /* ===== CHOICES ===== */
    .choices { display: flex; flex-direction: column; gap: 10px; }
    .choice-btn {
      width: 100%; padding: 15px 18px;
      background: var(--card); border: 2px solid var(--border);
      border-radius: 14px; font-size: 15px; font-weight: 600; color: var(--text);
      cursor: pointer; text-align: left; display: flex; align-items: center; gap: 12px;
      transition: border-color 0.2s, background 0.2s, transform 0.1s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05); -webkit-appearance: none;
    }
    .choice-btn:active { transform: scale(0.98); }
    .choice-letter {
      width: 30px; height: 30px; background: var(--bg);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: var(--subtext);
      flex-shrink: 0; transition: background 0.2s, color 0.2s;
    }
    .choice-btn.correct { border-color: var(--correct); background: #F0FFF4; }
    .choice-btn.correct .choice-letter { background: var(--correct); color: white; }
    .choice-btn.wrong   { border-color: var(--wrong);   background: #FFF5F5; }
    .choice-btn.wrong   .choice-letter { background: var(--wrong);   color: white; }
    .choice-btn:disabled { cursor: default; }

    /* ===== FEEDBACK ===== */
    .feedback {
      background: var(--card); border-radius: 16px; padding: 14px 18px;
      margin-top: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      display: none; animation: fadeSlideUp 0.3s ease;
    }
    .feedback.show { display: block; }
    .feedback-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .feedback-icon   { font-size: 20px; }
    .feedback-title  { font-size: 15px; font-weight: 700; }
    .feedback-title.correct { color: var(--correct); }
    .feedback-title.wrong   { color: var(--wrong); }
    .feedback-removed {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 700; color: var(--correct);
      background: #F0FFF4; border: 1px solid #9AE6B4;
      padding: 2px 8px; border-radius: 20px; margin-left: 6px;
    }
    .feedback-answer  { font-size: 13px; color: var(--subtext); margin-bottom: 6px; }
    .feedback-answer strong { color: var(--text); }
    .feedback-example {
      font-size: 13px; line-height: 1.6; color: var(--subtext);
      border-top: 1px solid var(--border); padding-top: 8px;
    }
    .feedback-example em { color: var(--text); font-style: italic; }

    .btn-next {
      width: 100%; padding: 14px; background: var(--primary); color: white;
      border: none; border-radius: 14px; font-size: 16px; font-weight: 700;
      cursor: pointer; margin-top: 10px; transition: background 0.2s, transform 0.1s;
      display: none;
    }
    .btn-next.show   { display: block; }
    .btn-next.review { background: var(--review); }
    .btn-next:active { filter: brightness(0.9); transform: scale(0.98); }

    /* ===== RESULT SCREEN ===== */
    .result-card {
      background: var(--card); border-radius: 20px; padding: 28px 20px 24px;
      box-shadow: var(--shadow); text-align: center; margin-top: 16px;
    }
    .result-emoji  { font-size: 68px; margin-bottom: 10px; }
    .result-title  { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
    .result-score  {
      font-size: 50px; font-weight: 800; color: var(--primary);
      line-height: 1; margin: 14px 0 4px;
    }
    .result-score.review-score { color: var(--review); }
    .result-score span { font-size: 20px; color: var(--subtext); font-weight: 600; }
    .result-comment { font-size: 14px; color: var(--subtext); margin-bottom: 20px; line-height: 1.6; }
    .result-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;
    }
    .result-stat { background: var(--bg); border-radius: 12px; padding: 12px 8px; }
    .result-stat-val   { font-size: 22px; font-weight: 800; }
    .result-stat-val.green { color: var(--correct); }
    .result-stat-val.red   { color: var(--wrong); }
    .result-stat-label { font-size: 12px; color: var(--subtext); margin-top: 3px; }

    /* remaining wrong words info */
    .remaining-info {
      background: #FFF5F5; border: 1px solid #FED7D7;
      border-radius: 12px; padding: 12px 16px; margin-bottom: 16px;
      font-size: 13px; color: var(--wrong); font-weight: 600;
      display: none;
    }
    .remaining-info.show { display: block; }
    .remaining-info span { font-weight: 800; font-size: 16px; }

    .cleared-info {
      background: #F0FFF4; border: 1px solid #9AE6B4;
      border-radius: 12px; padding: 12px 16px; margin-bottom: 16px;
      font-size: 13px; color: var(--correct); font-weight: 600;
      display: none;
    }
    .cleared-info.show { display: block; }

    .btn-primary {
      width: 100%; padding: 15px; background: var(--primary); color: white;
      border: none; border-radius: 14px; font-size: 16px; font-weight: 700;
      cursor: pointer; transition: filter 0.2s; margin-bottom: 10px;
      box-shadow: 0 4px 12px rgba(74,144,226,0.3);
    }
    .btn-primary:active { filter: brightness(0.9); }

    .btn-review-start {
      width: 100%; padding: 15px; background: var(--review); color: white;
      border: none; border-radius: 14px; font-size: 16px; font-weight: 700;
      cursor: pointer; transition: filter 0.2s; margin-bottom: 10px;
      box-shadow: 0 4px 12px rgba(155,89,182,0.3);
      display: none;
    }
    .btn-review-start.show { display: block; }
    .btn-review-start:active { filter: brightness(0.9); }

    .btn-outline {
      width: 100%; padding: 13px; background: transparent;
      color: var(--primary); border: 2px solid var(--primary);
      border-radius: 14px; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-outline:active { background: #EBF4FF; }
    .btn-outline.review-outline { color: var(--review); border-color: var(--review); }
    .btn-outline.review-outline:active { background: #F5EEFF; }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
    @keyframes pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.03); }
      100% { transform: scale(1); }
    }
    .animate-shake { animation: shake 0.4s ease; }
    .animate-pop   { animation: pop 0.25s ease; }
    .card-enter    { animation: fadeSlideUp 0.35s ease; }
  </style>
</head>
<body>

<header id="app-header">
  <h1>📘 TOEIC 英単語クイズ</h1>
  <p id="header-sub">4択で力試し！初心者向け</p>
</header>

<main>

  <!-- ===== START SCREEN ===== -->
  <div id="screen-start" class="screen active">
    <div class="start-card">
      <div class="icon">📚</div>
      <h2>英単語トレーニング</h2>
      <p>TOEICに出やすい英単語を<br>4択クイズで楽しく覚えよう！</p>

      <div class="level-select">
        <label>レベルを選択（挑戦モード）</label>
        <div class="level-btns">
          <button class="level-btn selected" data-level="beginner">初級</button>
          <button class="level-btn" data-level="intermediate">中級</button>
          <button class="level-btn" data-level="advanced">上級</button>
        </div>
      </div>

      <div class="mode-cards">
        <!-- 挑戦モード -->
        <button class="mode-card challenge" id="btn-challenge">
          <span class="mode-icon">🎯</span>
          <div class="mode-info">
            <div class="mode-title">挑戦モード</div>
            <div class="mode-desc">レベルから10問出題。<br>間違えた単語は自動で苦手リストに追加！</div>
          </div>
          <span class="mode-arrow">›</span>
        </button>

        <!-- 復習モード -->
        <button class="mode-card review" id="btn-review">
          <span class="mode-icon">📝</span>
          <div class="mode-info">
            <div class="mode-title">復習モード</div>
            <div class="mode-desc">苦手な単語だけを集中練習。<br>正解したら苦手リストから削除！</div>
          </div>
          <span class="mode-badge" id="review-badge">0語</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ===== QUIZ SCREEN ===== -->
  <div id="screen-quiz" class="screen">
    <div class="mode-banner" id="mode-banner">
      <span id="mode-banner-icon"></span>
      <span id="mode-banner-text"></span>
    </div>

    <div class="stats-bar">
      <div class="stat">
        <div class="stat-val" id="stat-q">1</div>
        <div class="stat-label">問題</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <div class="stat-val" id="stat-correct">0</div>
        <div class="stat-label">正解</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <div class="stat-val" id="stat-streak">0</div>
        <div class="stat-label">連続正解</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <div class="stat-val" id="stat-total">10</div>
        <div class="stat-label">全問題</div>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>

    <div class="question-card card-enter" id="question-card">
      <div class="question-num" id="question-num">問題 1 / 10</div>
      <div class="word" id="word">word</div>
      <div class="pronunciation" id="pronunciation"></div>
      <div class="part-of-speech" id="pos"></div>
    </div>

    <div class="choices" id="choices"></div>

    <div class="feedback" id="feedback">
      <div class="feedback-header">
        <span class="feedback-icon" id="fb-icon"></span>
        <span class="feedback-title" id="fb-title"></span>
        <span class="feedback-removed" id="fb-removed" style="display:none">✓ 苦手リストから削除</span>
      </div>
      <div class="feedback-answer" id="fb-answer"></div>
      <div class="feedback-example" id="fb-example"></div>
    </div>

    <button class="btn-next" id="btn-next">次の問題へ →</button>
  </div>

  <!-- ===== RESULT SCREEN ===== -->
  <div id="screen-result" class="screen">
    <div class="result-card card-enter">
      <div class="result-emoji" id="result-emoji">🎉</div>
      <div class="result-title" id="result-title">クイズ終了！</div>
      <div class="result-score" id="result-score">
        <span id="result-correct">0</span>
        <span> / </span>
        <span id="result-total">10</span>
      </div>
      <div class="result-comment" id="result-comment"></div>

      <div class="result-grid">
        <div class="result-stat">
          <div class="result-stat-val green" id="res-correct">0</div>
          <div class="result-stat-label">正解数</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-val red" id="res-wrong">0</div>
          <div class="result-stat-label">不正解数</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-val" id="res-rate" style="color:var(--primary)">0%</div>
          <div class="result-stat-label">正答率</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-val" id="res-streak" style="color:#ED8936">0</div>
          <div class="result-stat-label">最大連続正解</div>
        </div>
      </div>

      <!-- 復習モード専用: 全問クリア -->
      <div class="cleared-info" id="cleared-info">
        🎊 苦手リストを全部クリアしました！
      </div>

      <!-- 復習モード専用: まだ残っている苦手単語 -->
      <div class="remaining-info" id="remaining-info">
        まだ苦手な単語が <span id="remaining-count">0</span> 語残っています
      </div>

      <!-- 挑戦モード後に苦手単語がある場合 -->
      <button class="btn-review-start" id="btn-go-review">
        📝 苦手単語を復習する（<span id="go-review-count">0</span>語）
      </button>

      <button class="btn-primary" id="btn-retry">もう一度チャレンジ</button>
      <button class="btn-outline" id="btn-back">← モード選択に戻る</button>
    </div>
  </div>

</main>

<script>
// ===== VOCABULARY DATABASE =====
const WORDS = {
  beginner: [
    { word: "meeting",    pron: "/ˈmiːtɪŋ/",        pos: "名詞",     answer: "会議",             choices: ["会議","書類","電話","休憩"],                             ex: "We have a <em>meeting</em> at 3 PM. （午後3時に会議があります。）" },
    { word: "send",       pron: "/sɛnd/",            pos: "動詞",     answer: "送る",             choices: ["送る","買う","読む","書く"],                             ex: "Please <em>send</em> me the report. （レポートを送ってください。）" },
    { word: "office",     pron: "/ˈɔːfɪs/",          pos: "名詞",     answer: "オフィス・事務所", choices: ["オフィス・事務所","学校","病院","駅"],                    ex: "She works in the <em>office</em>. （彼女はオフィスで働いています。）" },
    { word: "schedule",   pron: "/ˈskɛdʒuːl/",       pos: "名詞",     answer: "予定・スケジュール", choices: ["予定・スケジュール","給料","会社","上司"],              ex: "Check the <em>schedule</em> for next week. （来週の予定を確認してください。）" },
    { word: "report",     pron: "/rɪˈpɔːrt/",        pos: "名詞",     answer: "報告書",           choices: ["報告書","計画","商品","費用"],                           ex: "Submit the <em>report</em> by Friday. （金曜日までに報告書を提出してください。）" },

// ===== WRONG WORDS STORAGE (localStorage) =====
// Key: "toeic_wrong" → JSON array of word objects (with added .level field)
const STORAGE_KEY = 'toeic_wrong';

function loadWrongWords() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}

function saveWrongWords(list) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
}

function addWrongWord(wordObj, level) {
  const list = loadWrongWords();
  const id = level + ':' + wordObj.word;
  if (!list.find(w => w._id === id)) {
    list.push({ ...wordObj, _id: id, _level: level });
    saveWrongWords(list);
  }
}

function removeWrongWord(wordObj, level) {
  const id = level + ':' + wordObj.word;
  const list = loadWrongWords().filter(w => w._id !== id);
  saveWrongWords(list);
}

function getWrongCount() { return loadWrongWords().length; }

// ===== STATE =====
let state = {
  mode: 'challenge',   // 'challenge' | 'review'
  level: 'beginner',
  questions: [],
  current: 0,
  correct: 0,
  streak: 0,
  maxStreak: 0,
  answered: false,
};

// ===== UTILITIES =====
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function setHeaderMode(mode) {
  const header = document.getElementById('app-header');
  const sub    = document.getElementById('header-sub');
  if (mode === 'review') {
    header.classList.add('review-mode');
    sub.textContent = '苦手単語を集中復習！';
  } else {
    header.classList.remove('review-mode');
    sub.textContent = '4択で力試し！初心者向け';
  }
}

// ===== REFRESH START SCREEN =====
function refreshStart() {
  const count = getWrongCount();
  const badge = document.getElementById('review-badge');
  badge.textContent = count + '語';
  const reviewBtn = document.getElementById('btn-review');
  if (count === 0) {
    reviewBtn.setAttribute('disabled', 'true');
  } else {
    reviewBtn.removeAttribute('disabled');
  }
}

// ===== LEVEL BUTTONS =====
document.querySelectorAll('.level-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    state.level = btn.dataset.level;
  });
});

// ===== MODE START BUTTONS =====
document.getElementById('btn-challenge').addEventListener('click', () => {
  state.mode = 'challenge';
  startQuiz();
});

document.getElementById('btn-review').addEventListener('click', () => {
  state.mode = 'review';
  startQuiz();
});

// ===== START QUIZ =====
function startQuiz() {
  state.current = 0;
  state.correct = 0;
  state.streak  = 0;
  state.maxStreak = 0;
  state.answered = false;

  if (state.mode === 'challenge') {
    const pool = WORDS[state.level];
    state.questions = shuffle(pool).slice(0, 10);
  } else {
    // review mode: use wrong words list
    const wrong = loadWrongWords();
    state.questions = shuffle(wrong);
  }

  setHeaderMode(state.mode);
  applyModeStyles();
  show('screen-quiz');
  renderQuestion();
}

function applyModeStyles() {
  const isReview = state.mode === 'review';

  // mode banner
  const banner = document.getElementById('mode-banner');
  const bannerIcon = document.getElementById('mode-banner-icon');
  const bannerText = document.getElementById('mode-banner-text');
  banner.className = 'mode-banner ' + state.mode;
  bannerIcon.textContent = isReview ? '📝' : '🎯';
  bannerText.textContent = isReview
    ? `復習モード — 苦手単語 ${state.questions.length} 語`
    : `挑戦モード — ${state.level === 'beginner' ? '初級' : state.level === 'intermediate' ? '中級' : '上級'} 10問`;

  // progress bar color
  const pb = document.getElementById('progress-bar');
  if (isReview) pb.classList.add('review-bar');
  else          pb.classList.remove('review-bar');

  // stat-val color
  document.querySelectorAll('.stat-val').forEach(el => {
    if (isReview) el.classList.add('review-color');
    else          el.classList.remove('review-color');
  });

  // next button color
  const nextBtn = document.getElementById('btn-next');
  if (isReview) nextBtn.classList.add('review');
  else          nextBtn.classList.remove('review');
}

// ===== RENDER QUESTION =====
function renderQuestion() {
  const q     = state.questions[state.current];
  const idx   = state.current;
  const total = state.questions.length;
  const isReview = state.mode === 'review';

  document.getElementById('stat-q').textContent       = idx + 1;
  document.getElementById('stat-correct').textContent = state.correct;
  document.getElementById('stat-streak').textContent  = state.streak;
  document.getElementById('stat-total').textContent   = total;

  document.getElementById('progress-bar').style.width = (idx / total * 100) + '%';

  document.getElementById('question-num').textContent = `問題 ${idx + 1} / ${total}`;
  document.getElementById('word').textContent         = q.word;
  document.getElementById('pronunciation').textContent = q.pron;
  document.getElementById('pos').textContent          = q.pos;

  const posEl = document.getElementById('pos');
  if (isReview) posEl.classList.add('review-pos');
  else          posEl.classList.remove('review-pos');

  const card = document.getElementById('question-card');
  card.classList.remove('card-enter');
  void card.offsetWidth;
  card.classList.add('card-enter');

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  const letters  = ['A', 'B', 'C', 'D'];
  const shuffled = shuffle(q.choices);

  shuffled.forEach((choice, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-letter">${letters[i]}</span><span>${choice}</span>`;
    btn.addEventListener('click', () => selectAnswer(choice, q));
    choicesEl.appendChild(btn);
  });

  document.getElementById('feedback').classList.remove('show');
  document.getElementById('btn-next').classList.remove('show');
  document.getElementById('fb-removed').style.display = 'none';

  state.answered = false;
}

// ===== SELECT ANSWER =====
function selectAnswer(choice, q) {
  if (state.answered) return;
  state.answered = true;

  const isCorrect = (choice === q.answer);
  const isReview  = state.mode === 'review';
  const level     = q._level || state.level;

  document.querySelectorAll('.choice-btn').forEach(btn => {
    btn.disabled = true;
    const text = btn.querySelector('span:last-child').textContent;
    if (text === q.answer)              btn.classList.add('correct');
    else if (text === choice && !isCorrect) btn.classList.add('wrong');
  });

  if (isCorrect) {
    state.correct++;
    state.streak++;
    if (state.streak > state.maxStreak) state.maxStreak = state.streak;

    // In review mode: remove from wrong list
    if (isReview) {
      removeWrongWord(q, level);
      document.getElementById('fb-removed').style.display = 'inline-flex';
    }

    const card = document.getElementById('question-card');
    card.classList.add('animate-pop');
    setTimeout(() => card.classList.remove('animate-pop'), 300);
  } else {
    state.streak = 0;

    // In challenge mode: add to wrong list
    if (!isReview) {
      addWrongWord(q, level);
    }

    const card = document.getElementById('question-card');
    card.classList.add('animate-shake');
    setTimeout(() => card.classList.remove('animate-shake'), 400);
  }

  document.getElementById('stat-streak').textContent = state.streak;

  const fb = document.getElementById('feedback');
  document.getElementById('fb-icon').textContent = isCorrect ? '✅' : '❌';
  const fbTitle = document.getElementById('fb-title');
  fbTitle.textContent = isCorrect ? '正解！' : '不正解…';
  fbTitle.className   = 'feedback-title ' + (isCorrect ? 'correct' : 'wrong');
  document.getElementById('fb-answer').innerHTML  = `正解：<strong>${q.answer}</strong>`;
  document.getElementById('fb-example').innerHTML = `例文：${q.ex}`;
  fb.classList.add('show');

  document.getElementById('btn-next').classList.add('show');
}

// ===== NEXT QUESTION =====
document.getElementById('btn-next').addEventListener('click', () => {
  state.current++;
  if (state.current >= state.questions.length) showResult();
  else renderQuestion();
});

// ===== RESULT =====
function showResult() {
  const total    = state.questions.length;
  const correct  = state.correct;
  const rate     = Math.round(correct / total * 100);
  const isReview = state.mode === 'review';

  document.getElementById('result-correct').textContent = correct;
  document.getElementById('result-total').textContent   = total;
  document.getElementById('res-correct').textContent    = correct;
  document.getElementById('res-wrong').textContent      = total - correct;
  document.getElementById('res-rate').textContent       = rate + '%';
  document.getElementById('res-streak').textContent     = state.maxStreak;

  const scoreEl = document.getElementById('result-score');
  if (isReview) scoreEl.classList.add('review-score');
  else          scoreEl.classList.remove('review-score');

  // --- challenge mode result messages ---
  let emoji, title, comment;
  if (isReview) {
    const remaining = getWrongCount();
    if (remaining === 0) {
      emoji = '🎊'; title = '苦手単語を全クリア！';
      comment = '素晴らしい！苦手リストが空になりました。\n挑戦モードで新しい問題に挑戦しよう！';
    } else if (rate === 100) {
      emoji = '🌟'; title = '全問正解！';
      comment = `今回は全問正解！まだ苦手単語が ${remaining} 語残っています。`;
    } else if (rate >= 60) {
      emoji = '💪'; title = 'よく頑張りました！';
      comment = `正答率 ${rate}%。苦手単語がまだ ${remaining} 語残っています。\n繰り返し復習しましょう！`;
    } else {
      emoji = '📖'; title = 'もう一息！';
      comment = `正答率 ${rate}%。焦らず繰り返し練習しましょう！\n苦手単語が ${remaining} 語残っています。`;
    }

    // show/hide cleared or remaining info
    const remaining2 = getWrongCount();
    if (remaining2 === 0) {
      document.getElementById('cleared-info').classList.add('show');
      document.getElementById('remaining-info').classList.remove('show');
    } else {
      document.getElementById('cleared-info').classList.remove('show');
      document.getElementById('remaining-info').classList.add('show');
      document.getElementById('remaining-count').textContent = remaining2;
    }
    document.getElementById('btn-go-review').classList.remove('show');

    // retry button text
    document.getElementById('btn-retry').textContent = 'もう一度復習する';
    document.getElementById('btn-back').className    = 'btn-outline review-outline';
    document.getElementById('btn-back').textContent  = '← モード選択に戻る';

  } else {
    // challenge mode
    document.getElementById('cleared-info').classList.remove('show');
    document.getElementById('remaining-info').classList.remove('show');

    if (rate === 100) {
      emoji = '🏆'; title = '完璧！'; comment = '素晴らしい！全問正解です！\nこの調子で次のレベルに挑戦してみよう！';
    } else if (rate >= 80) {
      emoji = '🎉'; title = 'よくできました！'; comment = `正答率${rate}%！あと少しで満点です。\n間違えた問題を復習しましょう！`;
    } else if (rate >= 60) {
      emoji = '😊'; title = 'まあまあです！'; comment = `正答率${rate}%。もう一度挑戦して\nスコアアップを目指しましょう！`;
    } else if (rate >= 40) {
      emoji = '💪'; title = 'もう少し！'; comment = `正答率${rate}%。繰り返し練習して\n単語を覚えていきましょう！`;
    } else {
      emoji = '📖'; title = 'がんばれ！'; comment = `正答率${rate}%。焦らず一つずつ\n単語を覚えていきましょう！`;
    }

    // show "go review" button if there are wrong words
    const wrongCount = getWrongCount();
    const goReviewBtn = document.getElementById('btn-go-review');
    if (wrongCount > 0) {
      goReviewBtn.classList.add('show');
      document.getElementById('go-review-count').textContent = wrongCount;
    } else {
      goReviewBtn.classList.remove('show');
    }

    document.getElementById('btn-retry').textContent = 'もう一度チャレンジ';
    document.getElementById('btn-back').className    = 'btn-outline';
    document.getElementById('btn-back').textContent  = '← モード選択に戻る';
  }

  document.getElementById('result-emoji').textContent   = emoji;
  document.getElementById('result-title').textContent   = title;
  document.getElementById('result-comment').textContent = comment;

  show('screen-result');
  refreshStart();
}

// ===== RESULT BUTTONS =====
document.getElementById('btn-retry').addEventListener('click', startQuiz);

document.getElementById('btn-go-review').addEventListener('click', () => {
  state.mode = 'review';
  startQuiz();
});

document.getElementById('btn-back').addEventListener('click', () => {
  setHeaderMode('challenge');
  refreshStart();
  show('screen-start');
});

// ===== INIT =====
refreshStart();
</script>

</body>
</html>
